<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wits Live Transit Network</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

    <style>
        :root {
            --bg: #fff5f6;
            --card: #ffffff;
            --primary: #ff758f;
            --primary-dark: #ff4d6d;
            --text: #4a154b;
            --muted: #718096;
            --accent: #fff0f3;
            --driver-color: #4a154b;
            --success: #2a9d8f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin: 15px 0;
            width: 100%;
            max-width: 450px;
        }

        h1 { font-size: 24px; margin: 0 0 4px 0; font-weight: 800; }
        header p { color: var(--muted); margin: 0; font-size: 13px; }

        .dashboard-card {
            background: var(--card);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 117, 143, 0.15);
            padding: 24px;
            box-sizing: border-box;
        }

        .view-panel { display: none; }
        .view-panel.active { display: block; }

        label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
            display: block;
        }

        select, input {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            border-radius: 14px;
            border: 2px solid #ffe5ec;
            background-color: #fbfbfb;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        optgroup {
            font-style: normal;
            font-weight: bold;
            color: var(--primary-dark);
            background: #fff;
        }

        option {
            color: var(--text);
            font-weight: 500;
        }

        button.action {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Bus Fleet Output Display Layout cards */
        .bus-card {
            background-color: var(--accent);
            border-left: 5px solid var(--primary-dark);
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .bus-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .bus-location { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .bus-eta { font-size: 14px; color: var(--primary-dark); font-weight: 600; }

        .status-panel {
            background-color: var(--accent);
            border-left: 5px solid var(--driver-color);
            padding: 18px;
            border-radius: 14px;
            margin-top: 14px;
        }

        .status-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .status-value { font-size: 18px; font-weight: 700; }
        
        .debug-coords {
            font-size: 11px;
            color: var(--muted);
            margin-top: 8px;
            font-family: monospace;
            line-height: 1.4;
        }

        /* Hidden Gate Authorization Panel footer styling */
        .gate-footer {
            margin-top: 24px;
            border-top: 1px dashed #ffe5ec;
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .gate-input-wrapper {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .gate-input-wrapper input {
            margin-bottom: 0;
            padding: 10px 14px;
            font-size: 13px;
            border-radius: 8px;
        }

        .gate-btn {
            background-color: #4a154b;
            color: white;
            border: none;
            padding: 10px 14px;
            font-weight: 700;
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Wits Transit Network</h1>
        <p>Precision Fleet System Monitor</p>
    </header>

    <div class="dashboard-card">
        
        <div id="student-panel" class="view-panel active">
            <label for="route-select">Select Target Route</label>
            <select id="route-select">
                <optgroup label="📅 Weekday Operations (Mon - Fri)">
                    <option value="route1">Route 1 - Full Circuit</option>
                    <option value="route2">Route 2 - NSW / WEC Shuttle</option>
                    <option value="route3a">Route 3A - WJ / AMIC Shuttle</option>
                    <option value="route3b">Route 3B - WJ / WEC Shuttle</option>
                    <option value="route4a">Route 4A - AMIC / NSW / WEC</option>
                    <option value="route4a1">Route 4A1 - WEC / NSW / AMIC</option>
                    <option value="route4b">Route 4B - NSW / WEC / AMIC</option>
                    <option value="route5">Route 5 - EOH / KNK / AMIC</option>
                </optgroup>
                <optgroup label="🏖️ Weekend & Holiday Operations (Sat - Sun)">
                    <option value="route1_weekend">Route 1 - Weekend Circuit</option>
                    <option value="route3c">Route 3C - WJ / WEC / AMIC Loop</option>
                    <option value="route6a">Route 6A - AMIC / KNK / Rosebank</option>
                    <option value="route6b">Route 6B - AMIC / NSW / Rosebank</option>
                    <option value="route6c">Route 6C - WEC / EOH / Rosebank</option>
                    <option value="route6d">Route 6D - WJ / Rosebank Shuttle</option>
                </optgroup>
            </select>

            <label>Active Buses on Route</label>
            <div id="bus-fleet-container">
                </div>
        </div>

        <div id="driver-panel" class="view-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span style="font-weight: 800; color: var(--driver-color); font-size: 14px;">🛠️ Operational Driver Console</span>
                <button onclick="logoutDriver()" style="background: none; border: none; color: red; font-size: 12px; font-weight: 700; cursor: pointer;">Exit Console</button>
            </div>

            <label for="bus-number">Bus / Shuttle Identifier Number</label>
            <input type="text" id="bus-number" placeholder="e.g. Bus 04, Shuttle 12" maxlength="15">

            <label for="driver-route-select">Assigned Mission Route Path</label>
            <select id="driver-route-select">
                <optgroup label="📅 Weekday Operations (Mon - Fri)">
                    <option value="route1">Route 1 - Full Circuit</option>
                    <option value="route2">Route 2 - NSW / WEC Shuttle</option>
                    <option value="route3a">Route 3A - WJ / AMIC Shuttle</option>
                    <option value="route3b">Route 3B - WJ / WEC Shuttle</option>
                    <option value="route4a">Route 4A - AMIC / NSW / WEC</option>
                    <option value="route4a1">Route 4A1 - WEC / NSW / AMIC</option>
                    <option value="route4b">Route 4B - NSW / WEC / AMIC</option>
                    <option value="route5">Route 5 - EOH / KNK / AMIC</option>
                </optgroup>
                <optgroup label="🏖️ Weekend & Holiday Operations (Sat - Sun)">
                    <option value="route1_weekend">Route 1 - Weekend Circuit</option>
                    <option value="route3c">Route 3C - WJ / WEC / AMIC Loop</option>
                    <option value="route6a">Route 6A - AMIC / KNK / Rosebank</option>
                    <option value="route6b">Route 6B - AMIC / NSW / Rosebank</option>
                    <option value="route6c">Route 6C - WEC / EOH / Rosebank</option>
                    <option value="route6d">Route 6D - WJ / Rosebank Shuttle</option>
                </optgroup>
            </select>

            <button id="broadcast-btn" class="action" style="background-color: var(--driver-color);">Broadcast GPS Position</button>

            <div class="status-panel">
                <div class="status-title">Local Geofencing Metrics</div>
                <div id="driver-status" class="status-value">Tracking Standby</div>
                <div id="driver-coords" class="debug-coords">Lat: --<br>Lng: --<br>Accuracy Radius: --</div>
            </div>
        </div>

        <div class="gate-footer" id="gate-container">
            <div style="font-size: 12px; color: var(--muted); line-height: 1.4;">
                🎒 <b>Lost Property Lookup:</b> Match the Fleet ID on your dashboard logs to terminal support lines to retrieve left bags.
            </div>
            <div class="gate-input-wrapper">
                <input type="password" id="access-code-input" placeholder="Enter Staff Console Pin Code">
                <button class="gate-btn" onclick="verifyAccessGateToken()">Verify</button>
            </div>
        </div>

    </div>

    <script>
        const UNIQUE_PROJECT_ID = "wits_campus_tracker_2026_prod";

        const stopCoordinates = {
            "AMIC Deck": [-26.19260, 28.03030],
            "Noswall Hall": [-26.19120, 28.03250],
            "Wits Junction": [-26.18203, 28.03683], 
            "Wits Education Campus": [-26.17963, 28.04442], 
            "EOH (Oppenheimer)": [-26.18020, 28.02850],
            "KNK Residence": [-26.18450, 28.0290],
            "Rosebank Mall": [-26.14620, 28.04160]
        };

        const routeSchedules = {
            route1: ["AMIC Deck", "Noswall Hall", "Wits Junction", "Wits Education Campus", "EOH (Oppenheimer)", "KNK Residence"],
            route2: ["Noswall Hall", "Wits Education Campus", "AMIC Deck"],
            route3a: ["Wits Junction", "AMIC Deck"],
            route3b: ["Wits Junction", "Wits Education Campus"],
            route4a: ["AMIC Deck", "Noswall Hall", "Wits Education Campus"],
            route4a1: ["Wits Education Campus", "Noswall Hall", "AMIC Deck"],
            route4b: ["Noswall Hall", "Wits Education Campus", "AMIC Deck"],
            route5: ["EOH (Oppenheimer)", "KNK Residence", "AMIC Deck"],
            route1_weekend: ["AMIC Deck", "Noswall Hall", "Wits Education Campus", "EOH (Oppenheimer)", "KNK Residence"], 
            route3c: ["Wits Junction", "Wits Education Campus", "AMIC Deck"],
            route6a: ["AMIC Deck", "KNK Residence", "Rosebank Mall"],
            route6b: ["AMIC Deck", "Noswall Hall", "Rosebank Mall"],
            route6c: ["Wits Education Campus", "EOH (Oppenheimer)", "Rosebank Mall"],
            route6d: ["Wits Junction", "Rosebank Mall"]
        };

        let trackedBusesData = {};
        let isSearching = false;
        let searchTimeout = null;

        // INITIALIZE SECURE CLOUD CONNECTION PIPELINE
        const clientID = "client_" + Math.random().toString(16).substr(2, 8);
        const mqttClient = new Paho.MQTT.Client("broker.hivemq.com", Number(8884), "/mqtt", clientID);

        mqttClient.onConnectionLost = (responseObject) => {
            setTimeout(() => mqttClient.connect({onSuccess: onConnect, useSSL: true}), 2000);
        };

        mqttClient.onMessageArrived = (message) => {
            const data = JSON.parse(message.payloadString);
            const currentSelectedRoute = document.getElementById('route-select').value;
            
            if (data.route === currentSelectedRoute) {
                if (data.offline === true) {
                    delete trackedBusesData[data.asset];
                } else {
                    trackedBusesData[data.asset] = {
                        location: data.location,
                        eta: data.eta,
                        timestamp: Date.now()
                    };
                }
                renderBusFleetDisplay();
            }
        };

        mqttClient.connect({ onSuccess: onConnect, useSSL: true });

        function onConnect() {
            updateSubscription();
        }

        function updateSubscription() {
            if (mqttClient.isConnected()) {
                const currentRoute = document.getElementById('route-select').value;
                mqttClient.unsubscribe(UNIQUE_PROJECT_ID + "/#");
                mqttClient.subscribe(UNIQUE_PROJECT_ID + "/" + currentRoute + "/+");
                
                trackedBusesData = {}; 
                
                // Trigger the searching phase states instantly
                isSearching = true;
                renderBusFleetDisplay();

                if (searchTimeout) clearTimeout(searchTimeout);
                
                // Allow a 4-second listening window before declaring the line completely empty
                searchTimeout = setTimeout(() => {
                    isSearching = false;
                    renderBusFleetDisplay();
                }, 4000);
            }
        }

        document.getElementById('route-select').addEventListener('change', updateSubscription);

        function renderBusFleetDisplay() {
            const container = document.getElementById('bus-fleet-container');
            container.innerHTML = "";
            
            const activeBusesKeys = Object.keys(trackedBusesData).filter(key => {
                return (Date.now() - trackedBusesData[key].timestamp) < 25000;
            });

            if (activeBusesKeys.length === 0) {
                if (isSearching) {
                    container.innerHTML = `<div style="color: var(--muted); text-align: center; padding: 25px; font-size: 14px; font-weight: 600;">🔍 Searching for active broadcasts...</div>`;
                } else {
                    container.innerHTML = `<div style="color: var(--muted); text-align: center; padding: 25px; font-size: 14px;">No active buses running on this route right now.</div>`;
                }
                return;
            }

            activeBusesKeys.forEach(assetId => {
                const bus = trackedBusesData[assetId];
                const cardHtml = `
                    <div class="bus-card">
                        <div class="bus-meta">
                            <span>Fleet ID: ${assetId}</span>
                            <span style="color: var(--success);">● LIVE SECURE</span>
                        </div>
                        <div class="bus-location">${bus.location}</div>
                        <div class="bus-eta">${bus.eta}</div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        setInterval(renderBusFleetDisplay, 5000);

        // HAVERSINE PRECISION RADIAL METRIC ENGINE
        function calculateHaversineDistanceInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const phi1 = lat1 * Math.PI / 180;
            const phi2 = lat2 * Math.PI / 180;
            const deltaPhi = (lat2 - lat1) * Math.PI / 180;
            const deltaLon = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                      Math.cos(phi1) * Math.cos(phi2) *
                      Math.sin(deltaLon / 2) * Math.sin(deltaLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c; 
        }

        // TELEMETRY HARDWARE CONTROLLER PIPELINE
        let geoWatchID = null;
        let isBroadcasting = false;
        const broadcastBtn = document.getElementById('broadcast-btn');

        broadcastBtn.addEventListener('click', () => {
            const inputField = document.getElementById('bus-number');
            if (!inputField.value.trim()) {
                alert("Please input an operational vehicle asset label description first.");
                return;
            }

            if (isBroadcasting) {
                const selectedRoute = document.getElementById('driver-route-select').value;
                const busLabelIdentifier = inputField.value.trim().toUpperCase();
                
                if (mqttClient.isConnected()) {
                    const offlinePayload = { route: selectedRoute, asset: busLabelIdentifier, offline: true };
                    const msg = new Paho.MQTT.Message(JSON.stringify(offlinePayload));
                    msg.destinationName = UNIQUE_PROJECT_ID + "/" + selectedRoute + "/" + clientID;
                    mqttClient.send(msg);
                }

                if (geoWatchID) navigator.geolocation.clearWatch(geoWatchID);
                isBroadcasting = false;
                broadcastBtn.innerText = "Broadcast GPS Position";
                broadcastBtn.style.backgroundColor = "var(--driver-color)";
                document.getElementById('driver-status').innerText = "Tracking Standby";
                inputField.disabled = false;
            } else {
                if ("geolocation" in navigator) {
                    isBroadcasting = true;
                    inputField.disabled = true;
                    broadcastBtn.innerText = "Disconnect Live Broadcast";
                    broadcastBtn.style.backgroundColor = "#d90429";
                    document.getElementById('driver-status').innerText = "Acquiring Precision Sat Fix...";

                    // LATENCY FIX: Force an immediate individual location poll right now!
                    navigator.geolocation.getCurrentPosition(handleGPSUpdate, handleGPSError, {
                        enableHighAccuracy: true
                    });

                    // Subsequently queue the moving listener channel thread loop
                    geoWatchID = navigator.geolocation.watchPosition(handleGPSUpdate, handleGPSError, {
                        enableHighAccuracy: true,
                        maximumAge: 0
                    });
                }
            }
        });

        function handleGPSUpdate(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy; 
            
            document.getElementById('driver-coords').innerHTML = `Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}<br>Signal Error Margin: ${accuracy.toFixed(1)}m`;
            
            let closestStopName = "";
            let shortestDistanceInMeters = Infinity;

            for (const [stopName, coords] of Object.entries(stopCoordinates)) {
                const distanceMeters = calculateHaversineDistanceInMeters(lat, lng, coords[0], coords[1]);
                if (distanceMeters < shortestDistanceInMeters) {
                    shortestDistanceInMeters = distanceMeters;
                    closestStopName = stopName;
                }
            }

            const selectedRoute = document.getElementById('driver-route-select').value;
            const routeStopsArray = routeSchedules[selectedRoute];
            let calculatedLocationText = "";
            let calculatedETAText = "";

            if (shortestDistanceInMeters <= 150) {
                calculatedLocationText = `At ${closestStopName}`;
                
                const currentStopPositionIdx = routeStopsArray.indexOf(closestStopName);
                let upcomingStopTarget = routeStopsArray[0];
                if (currentStopPositionIdx !== -1 && (currentStopPositionIdx + 1) < routeStopsArray.length) {
                    upcomingStopTarget = routeStopsArray[currentStopPositionIdx + 1];
                }
                calculatedETAText = `⏱️ Delayed: Boarding for ${upcomingStopTarget}`;
            } else {
                let upcomingStopTarget = closestStopName;
                calculatedLocationText = `In Transit (Approaching ${closestStopName})`;
                const mockMinutes = Math.floor(Math.random() * 5) + 2;
                calculatedETAText = `⏱️ ETA: ~${mockMinutes} mins away from ${upcomingStopTarget}`;
            }

            document.getElementById('driver-status').innerHTML = `🟢 Live: ${calculatedLocationText}`;

            const busLabelIdentifier = document.getElementById('bus-number').value.trim().toUpperCase();
            const payload = {
                route: selectedRoute,
                location: calculatedLocationText,
                eta: calculatedETAText,
                asset: busLabelIdentifier,
                offline: false
            };

            if (mqttClient.isConnected()) {
                const message = new Paho.MQTT.Message(JSON.stringify(payload));
                message.destinationName = UNIQUE_PROJECT_ID + "/" + selectedRoute + "/" + clientID;
                mqttClient.send(message);
            }
        }

        function handleGPSError(err) {
            document.getElementById('driver-status').innerText = "GPS Access Token Error. Check device permissions layouts.";
        }

        function verifyAccessGateToken() {
            const tokenInput = document.getElementById('access-code-input');
            
            if (tokenInput.value === "WITS2026") {
                document.getElementById('student-panel').classList.remove('active');
                document.getElementById('gate-container').style.display = "none";
                document.getElementById('driver-panel').classList.add('active');
                tokenInput.value = ""; 
            } else {
                alert("Invalid security authorization access credential token.");
            }
        }

        function logoutDriver() {
            if (isBroadcasting) {
                broadcastBtn.click(); 
            }
            document.getElementById('driver-panel').classList.remove('active');
            document.getElementById('gate-container').style.display = "flex";
            document.getElementById('student-panel').classList.add('active');
        }
    </script>
</body>
</html>
